name: FFmpeg Media Pipeline
on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Input file path"
        required: true
      output_format:
        description: "Output format (mp4, webm, gif, mp3)"
        required: true
        default: "mp4"

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release
      - name: Process media
        run: |
          INPUT="${{ github.event.inputs.input_file }}"
          FORMAT="${{ github.event.inputs.output_format }}"

          if [ ! -f "$INPUT" ]; then
            echo "ERROR: Input file not found: $INPUT"
            exit 1
          fi

          mkdir -p output
          BASENAME=$(basename "${INPUT%.*}")
          OUTPUT="output/${BASENAME}.${FORMAT}"

          echo "FFmpeg version:"
          ffmpeg -version | head -1
          echo "Converting: $INPUT -> $OUTPUT"

          case "$FORMAT" in
            mp4)
              ffmpeg -i "$INPUT" -c:v libx264 -preset fast -c:a aac -movflags +faststart "$OUTPUT"
              ;;
            webm)
              ffmpeg -i "$INPUT" -c:v libvpx-vp9 -crf 30 -b:v 0 -c:a libopus "$OUTPUT"
              ;;
            gif)
              ffmpeg -i "$INPUT" -vf "fps=15,scale=480:-1:flags=lanczos" -loop 0 "$OUTPUT"
              ;;
            mp3)
              ffmpeg -i "$INPUT" -vn -c:a libmp3lame -q:a 2 "$OUTPUT"
              ;;
            *)
              echo "ERROR: Unsupported format: $FORMAT (use mp4, webm, gif, or mp3)"
              exit 1
              ;;
          esac

          echo "Output: $OUTPUT ($(du -h "$OUTPUT" | cut -f1))"
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: processed-media
          path: output/
          retention-days: 7
